name: Integration

on:
  # Run manually or on schedule
  workflow_dispatch:
  schedule:
    # Daily at 06:00 UTC
    - cron: "0 6 * * *"

concurrency:
  group: integration
  cancel-in-progress: true

jobs:
  integration:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Run integration tests
        run: pnpm test:integration
        env:
          INTEGRATION_RUNTIME_COMMAND: "echo"
          INTEGRATION_TIMEOUT_MS: "10000"
